---
- name: Deploy Mail Server
  hosts: all
  become: true
  vars:
    stalwart_root: "/etc/stalwart/{{ server_hostname }}"
    stalwart_cli_arch_map:
      x86_64: x86_64
      amd64: x86_64
      aarch64: aarch64
      arm64: aarch64

  tasks:
    # -------------------------------------------------------------------------
    # Directories and Configuration
    # -------------------------------------------------------------------------
    - name: Ensure Stalwart configuration & application directories exist
      file:
        path: "{{ item }}"
        state: directory
        owner: "2000"
        group: "2000"
        mode: "0750"
      loop:
        - "{{ stalwart_root }}"
        - "{{ stalwart_root }}/data"
        - "{{ stalwart_root }}/logs"

    - name: Copy `stalwart.env`
      copy:
        content: "{{ stalwart_env }}"
        dest: "{{ stalwart_root }}/stalwart.env"
        owner: "2000"
        group: "2000"
        mode: "0640"

    - name: Copy `bootstrap.ndjson`
      copy:
        content: "{{ stalwart_bootstrap_plan }}"
        dest: "{{ stalwart_root }}/bootstrap.ndjson"
        owner: "2000"
        group: "2000"
        mode: "0640"

    - name: Copy `docker-compose.yml`
      copy:
        content: "{{ docker_compose }}"
        dest: "{{ stalwart_root }}/docker-compose.yml"
        mode: "0644"

    - name: Validate `docker-compose.yml`
      command: docker compose config -q
      args:
        chdir: "{{ stalwart_root }}"

    # -------------------------------------------------------------------------
    # Initial Startup in Bootstrap Mode
    # -------------------------------------------------------------------------

    - name: Pull images (optional)
      command: docker compose pull
      args:
        chdir: "{{ stalwart_root }}"
      register: pull_result
      ignore_errors: true

    - name: Start stack in bootstrap mode
      command: docker compose up -d --remove-orphans
      args:
        chdir: "{{ stalwart_root }}"
      register: compose_up_bootstrap

    # -------------------------------------------------------------------------
    # Health Checks
    # -------------------------------------------------------------------------
    - name: Wait for HTTP port to be ready
      wait_for:
        host: 127.0.0.1
        port: 8080
        timeout: 180
      register: wait_result
      failed_when: wait_result is failed

    - name: Check if bootstrap has already been completed
      stat:
        path: "{{ stalwart_root }}/config.json"
      register: bootstrap_config

    - name: Validate target architecture for Stalwart CLI release
      fail:
        msg: "Unsupported architecture '{{ ansible_architecture }}' for Stalwart CLI download."
      when:
        - not bootstrap_config.stat.exists
        - ansible_architecture not in stalwart_cli_arch_map

    - name: Set Stalwart CLI download values
      set_fact:
        stalwart_cli_arch: "{{ stalwart_cli_arch_map[ansible_architecture] }}"
        stalwart_cli_os_id: "{{ 'unknown-linux-gnu' if ansible_system == 'Linux' else 'apple-darwin' if ansible_system == 'Darwin' else '' }}"
        stalwart_cli_fallback_os_id: "{{ 'unknown-linux-musl' if ansible_system == 'Linux' else '' }}"
        stalwart_cli_release_base: "{{ 'https://github.com/stalwartlabs/cli/releases/latest/download' if (stalwart_cli_version | default('latest', true)) == 'latest' else 'https://github.com/stalwartlabs/cli/releases/download/' ~ (stalwart_cli_version | default('latest', true)) }}"
      when: not bootstrap_config.stat.exists

    - name: Validate target operating system for Stalwart CLI release
      fail:
        msg: "Unsupported operating system '{{ ansible_system }}' for Stalwart CLI download."
      when:
        - not bootstrap_config.stat.exists
        - not stalwart_cli_os_id

    - name: Set Stalwart CLI package details
      set_fact:
        stalwart_cli_filename: "stalwart-cli-{{ stalwart_cli_arch }}-{{ stalwart_cli_os_id }}.tar.xz"
        stalwart_cli_download_url: "{{ stalwart_cli_release_base }}/stalwart-cli-{{ stalwart_cli_arch }}-{{ stalwart_cli_os_id }}.tar.xz"
        stalwart_cli_fallback_filename: "stalwart-cli-{{ stalwart_cli_arch }}-{{ stalwart_cli_fallback_os_id }}.tar.xz"
        stalwart_cli_fallback_download_url: "{{ stalwart_cli_release_base }}/stalwart-cli-{{ stalwart_cli_arch }}-{{ stalwart_cli_fallback_os_id }}.tar.xz"
      when: not bootstrap_config.stat.exists

    - name: Create temporary directory for Stalwart CLI extraction
      tempfile:
        state: directory
        suffix: stalwart-cli
      register: stalwart_cli_tempdir
      when: not bootstrap_config.stat.exists

    - name: Download Stalwart CLI release archive on remote host
      get_url:
        url: "{{ stalwart_cli_download_url }}"
        dest: "{{ stalwart_cli_tempdir.path }}/{{ stalwart_cli_filename }}"
        mode: "0644"
      when: not bootstrap_config.stat.exists

    - name: Extract Stalwart CLI archive on remote host
      unarchive:
        src: "{{ stalwart_cli_tempdir.path }}/{{ stalwart_cli_filename }}"
        dest: "{{ stalwart_cli_tempdir.path }}"
        remote_src: true
      when: not bootstrap_config.stat.exists

    - name: Find extracted Stalwart CLI binary
      find:
        paths: "{{ stalwart_cli_tempdir.path }}"
        file_type: file
        patterns: "stalwart-cli"
        recurse: true
      register: extracted_stalwart_cli
      when: not bootstrap_config.stat.exists

    - name: Fail if extracted archive does not contain Stalwart CLI binary
      fail:
        msg: "Downloaded archive {{ stalwart_cli_filename }} does not contain a 'stalwart-cli' binary."
      when:
        - not bootstrap_config.stat.exists
        - extracted_stalwart_cli.matched | int == 0

    - name: Install Stalwart CLI binary into deployment directory
      copy:
        src: "{{ extracted_stalwart_cli.files[0].path }}"
        dest: "{{ stalwart_root }}/stalwart-cli"
        mode: "0755"
        remote_src: true
      when: not bootstrap_config.stat.exists

    - name: Verify Stalwart CLI starts
      command: "{{ stalwart_root }}/stalwart-cli --help"
      register: stalwart_cli_check
      changed_when: false
      failed_when: false
      when: not bootstrap_config.stat.exists

    - name: Download fallback musl Stalwart CLI archive on glibc mismatch
      get_url:
        url: "{{ stalwart_cli_fallback_download_url }}"
        dest: "{{ stalwart_cli_tempdir.path }}/{{ stalwart_cli_fallback_filename }}"
        mode: "0644"
      register: fallback_download_result
      when:
        - not bootstrap_config.stat.exists
        - ansible_system == 'Linux'
        - stalwart_cli_fallback_os_id
        - stalwart_cli_fallback_os_id != stalwart_cli_os_id
        - stalwart_cli_check.rc != 0
        - "'GLIBC_' in (stalwart_cli_check.stderr | default(''))"

    - name: Create fallback extraction directory
      file:
        path: "{{ stalwart_cli_tempdir.path }}/fallback"
        state: directory
        mode: "0755"
      when:
        - not bootstrap_config.stat.exists
        - fallback_download_result is defined
        - fallback_download_result is succeeded

    - name: Extract fallback musl Stalwart CLI archive
      unarchive:
        src: "{{ stalwart_cli_tempdir.path }}/{{ stalwart_cli_fallback_filename }}"
        dest: "{{ stalwart_cli_tempdir.path }}/fallback"
        remote_src: true
      when:
        - not bootstrap_config.stat.exists
        - fallback_download_result is defined
        - fallback_download_result is succeeded

    - name: Find extracted fallback Stalwart CLI binary
      find:
        paths: "{{ stalwart_cli_tempdir.path }}/fallback"
        file_type: file
        patterns: "stalwart-cli"
        recurse: true
      register: extracted_fallback_stalwart_cli
      when:
        - not bootstrap_config.stat.exists
        - fallback_download_result is defined
        - fallback_download_result is succeeded

    - name: Install fallback Stalwart CLI binary into deployment directory
      copy:
        src: "{{ extracted_fallback_stalwart_cli.files[0].path }}"
        dest: "{{ stalwart_root }}/stalwart-cli"
        mode: "0755"
        remote_src: true
      when:
        - not bootstrap_config.stat.exists
        - fallback_download_result is defined
        - fallback_download_result is succeeded
        - extracted_fallback_stalwart_cli.matched | int > 0

    - name: Re-verify Stalwart CLI after fallback install
      command: "{{ stalwart_root }}/stalwart-cli --help"
      register: stalwart_cli_check_after_fallback
      changed_when: false
      failed_when: false
      when:
        - not bootstrap_config.stat.exists
        - fallback_download_result is defined
        - fallback_download_result is succeeded

    - name: Ensure Stalwart CLI is executable before bootstrap apply
      fail:
        msg: >-
          {{
            (
              (stalwart_cli_check_after_fallback if (stalwart_cli_check_after_fallback is defined) else stalwart_cli_check)
              .get('stderr')
            )
            or
            (
              (stalwart_cli_check_after_fallback if (stalwart_cli_check_after_fallback is defined) else stalwart_cli_check)
              .get('stdout')
            )
            or 'Stalwart CLI could not be executed on target host.'
          }}
      when:
        - not bootstrap_config.stat.exists
        - (
            (stalwart_cli_check_after_fallback if (stalwart_cli_check_after_fallback is defined) else stalwart_cli_check)
            .get('rc', 1)
          ) != 0

    - name: Remove temporary Stalwart CLI extraction directory
      file:
        path: "{{ stalwart_cli_tempdir.path }}"
        state: absent
      when:
        - not bootstrap_config.stat.exists
        - stalwart_cli_tempdir is defined

    - name: Apply bootstrap plan through `stalwart-cli`
      command: >
        {{ stalwart_root }}/stalwart-cli apply --file {{ stalwart_root }}/bootstrap.ndjson --json
      environment:
        STALWART_URL: "http://127.0.0.1:8080"
        STALWART_USER: "{{ recovery_admin_user }}"
        STALWART_PASSWORD: "{{ recovery_admin_password }}"
      register: apply_result
      changed_when: apply_result.rc == 0 and ('"created"' in apply_result.stdout or '"updated"' in apply_result.stdout)
      failed_when: false
      when: not bootstrap_config.stat.exists

    - name: Fail deployment if bootstrap apply failed for reasons other than already-bootstrapped server
      fail:
        msg: "{{ apply_result.get('stdout') or apply_result.get('stderr') or 'Bootstrap apply failed with no output.' }}"
      when:
        - not bootstrap_config.stat.exists
        - apply_result is defined
        - apply_result.get('rc', 1) != 0
        - "'This operation is only allowed bootstrap mode' not in (apply_result.get('stdout', ''))"
        - "'This operation is only allowed bootstrap mode' not in (apply_result.get('stderr', ''))"

    - name: Restart the Stalwart
      command: docker compose restart stalwart
      args:
        chdir: "{{ stalwart_root }}"
      register: restart_stalwart

    - name: Ensure full stack is up
      command: docker compose up -d --remove-orphans
      args:
        chdir: "{{ stalwart_root }}"
      register: compose_up

    - name: Wait for HTTP port to be ready after normal restart
      wait_for:
        host: 127.0.0.1
        port: 8080
        timeout: 180
      register: wait_result_normal
      failed_when: wait_result_normal is failed

    - name: Check container health via `docker compose ps`
      command: docker compose ps
      args:
        chdir: "{{ stalwart_root }}"
      register: ps_result
      ignore_errors: true

    # -------------------------------------------------------------------------
    # Debug Info
    # -------------------------------------------------------------------------
    - name: Display container status
      debug:
        var: ps_result.stdout_lines

    - name: Display bootstrap apply summary
      debug:
        var: apply_result.stdout_lines
      when: apply_result is defined
