---
- name: Deploy Mail Server
  hosts: all
  become: true
  vars:
    stalwart_root: "/opt/stalwart/{{ server_hostname }}"
    stalwart_config_dir: "{{ stalwart_root }}/etc"
    stalwart_config_content: "{{ config_toml }}"
    docker_compose_content: "{{ docker_compose }}"

  tasks:
    # -------------------------------------------------------------------------
    # Directories and Configuration
    # -------------------------------------------------------------------------
    - name: Ensure Stalwart root directories exist
      file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - "{{ stalwart_root }}"
        - "{{ stalwart_config_dir }}"
        - "{{ stalwart_root }}/logs"

    - name: Copy `config.toml`
      copy:
        content: "{{ stalwart_config_content }}"
        dest: "{{ stalwart_config_dir }}/config.toml"
        mode: "0644"

    - name: Copy `docker-compose.yml`
      copy:
        content: "{{ docker_compose_content }}"
        dest: "{{ stalwart_root }}/docker-compose.yml"
        mode: "0644"

    # -------------------------------------------------------------------------
    # Docker Image and Container Management
    # -------------------------------------------------------------------------
    - name: Pull images (optional)
      command: docker compose pull
      args:
        chdir: "{{ stalwart_root }}"
      register: pull_result
      ignore_errors: yes

    - name: Stop any existing Stalwart container
      command: docker compose down
      args:
        chdir: "{{ stalwart_root }}"
      ignore_errors: yes

    - name: Remove Redis container if not required
      command: docker rm -f redis_{{ server_hostname }}
      ignore_errors: yes
      when: not install_redis

    # -------------------------------------------------------------------------
    # Start stack
    # -------------------------------------------------------------------------
    - name: Start docker stack
      command: docker compose up -d
      args:
        chdir: "{{ stalwart_root }}"
      register: compose_up

    # -------------------------------------------------------------------------
    # Health Checks
    # -------------------------------------------------------------------------
    - name: Wait for HTTP port to be ready
      wait_for:
        host: 127.0.0.1
        port: "{{ http_port | int }}"
        timeout: 90
      register: wait_result
      ignore_errors: yes

    - name: Check container health via `docker compose ps`
      command: docker compose ps
      args:
        chdir: "{{ stalwart_root }}"
      register: ps_result
      ignore_errors: yes

    # -------------------------------------------------------------------------
    # Debug Info
    # -------------------------------------------------------------------------
    - name: Display container status
      debug:
        var: ps_result.stdout_lines
