---
- name: Install Docker
  hosts: all
  become: true
  gather_facts: yes

  vars:
    docker_arch_map:
      x86_64: amd64
      aarch64: arm64

  tasks:
    # -------------------------
    # Debian / Ubuntu
    # -------------------------
    - name: Install dependencies (Debian/Ubuntu)
      apt:
        name:
          - curl
          - gnupg
          - ca-certificates
          - lsb-release
        state: present
        update_cache: true
      when: ansible_os_family == "Debian"

    - name: Add Docker GPG key (Debian/Ubuntu)
      ansible.builtin.apt_key:
        url: https://download.docker.com/linux/{{ 'ubuntu' if ansible_distribution == 'Ubuntu' else 'debian' }}/gpg
        state: present
      when: ansible_os_family == "Debian"

    - name: Add Docker repository (Debian/Ubuntu)
      ansible.builtin.apt_repository:
        repo: >
          deb [arch={{ docker_arch_map[ansible_architecture] }}]
          https://download.docker.com/linux/{{ 'ubuntu' if ansible_distribution == 'Ubuntu' else 'debian' }}
          {{ ansible_distribution_release }} stable
        state: present
      when: ansible_os_family == "Debian"

    - name: Install Docker Engine (Debian/Ubuntu)
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
        state: present
        update_cache: true
      when: ansible_os_family == "Debian"

    # -------------------------
    # RHEL / CentOS / Rocky / AlmaLinux
    # -------------------------
    - name: Install dependencies (RHEL)
      yum:
        name:
          - curl
          - gnupg2
          - yum-utils
        state: present
      when: ansible_os_family == "RedHat"

    - name: Add Docker repository (RHEL)
      ansible.builtin.yum_repository:
        name: docker-ce
        description: Docker CE Stable - $basearch
        baseurl: https://download.docker.com/linux/centos/$releasever/$basearch/stable
        gpgcheck: yes
        gpgkey: https://download.docker.com/linux/centos/gpg
      when: ansible_os_family == "RedHat"

    - name: Install Docker (RHEL)
      yum:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
        state: present
      when: ansible_os_family == "RedHat"

    # -------------------------
    # Fedora
    # -------------------------
    - name: Install dependencies (Fedora)
      dnf:
        name:
          - curl
          - gnupg2
          - dnf-plugins-core
        state: present
      when: ansible_distribution == "Fedora"

    - name: Add Docker repository (Fedora)
      command: dnf config-manager --add-repo https://download.docker.com/linux/fedora/docker-ce.repo
      args:
        creates: /etc/yum.repos.d/docker-ce.repo
      when: ansible_distribution == "Fedora"

    - name: Install Docker (Fedora)
      dnf:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
        state: present
      when: ansible_distribution == "Fedora"

    # -------------------------
    # Arch Linux
    # -------------------------
    - name: Install dependencies (Arch)
      pacman:
        name:
          - curl
          - gnupg
        state: present
        update_cache: true
      when: ansible_os_family == "Archlinux"

    - name: Install Docker (Arch)
      pacman:
        name: docker
        state: present
      when: ansible_os_family == "Archlinux"

    # -------------------------
    # Common steps (all distros)
    # -------------------------
    - name: Enable and start Docker
      systemd:
        name: docker
        enabled: true
        state: started

    - name: Install Docker Compose
      get_url:
        url: "https://github.com/docker/compose/releases/latest/download/docker-compose-{{ ansible_system | lower }}-{{ ansible_architecture }}"
        dest: /usr/local/bin/docker-compose
        mode: "0755"

    - name: Verify Docker installation
      command: docker --version
      changed_when: false

    - name: Verify `docker-compose` installation
      command: docker-compose --version
      changed_when: false
