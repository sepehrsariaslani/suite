# ==============================================================================
# Frappe Meet — Docker Compose Stack
# ==============================================================================
# Full stack: Frappe backend + SFU + MariaDB + Redis + Nginx + Certbot
#
# Usage:
#   ./deploy.sh setup   # first time
#   ./deploy.sh update  # pull latest + migrate
#
# See deploy.sh for all commands.
# ==============================================================================

x-frappe-image: &frappe_image
  image: ${FRAPPE_IMAGE:-ghcr.io/frappe/meet:latest}
  restart: unless-stopped

x-depends-on-configurator: &depends_on_configurator
  depends_on:
    configurator:
      condition: service_completed_successfully

x-backend-defaults: &backend_defaults
  <<: [*depends_on_configurator, *frappe_image]
  volumes:
    - sites:/home/frappe/frappe-bench/sites
    - logs:/home/frappe/frappe-bench/logs

services:
  # ── Init: write common_site_config.json ─────────────────────────────────────
  configurator:
    <<: *frappe_image
    entrypoint: ["bash", "-c"]
    command:
      - >
        ls -1 apps > sites/apps.txt;
        bench set-config -g db_host mariadb;
        bench set-config -gp db_port 3306;
        bench set-config -g redis_cache "redis://redis:6379";
        bench set-config -g redis_queue "redis://redis:6379";
        bench set-config -g redis_socketio "redis://redis:6379";
        bench set-config -gp socketio_port 9000;
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: on-failure

  # ── Frappe Backend (gunicorn) ───────────────────────────────────────────────
  backend:
    <<: *backend_defaults

  # ── Frappe Frontend (nginx serving assets) ──────────────────────────────────
  frappe-frontend:
    <<: *frappe_image
    command: ["nginx-entrypoint.sh"]
    environment:
      BACKEND: backend:8000
      SOCKETIO: websocket:9000
      FRAPPE_SITE_NAME_HEADER: ${SITE_NAME}
      PROXY_READ_TIMEOUT: 120
      CLIENT_MAX_BODY_SIZE: 50m
    volumes:
      - sites:/home/frappe/frappe-bench/sites
    depends_on:
      - backend
      - websocket

  # ── Frappe Socketio ─────────────────────────────────────────────────────────
  websocket:
    <<: [*depends_on_configurator, *frappe_image]
    command: ["node", "/home/frappe/frappe-bench/apps/frappe/socketio.js"]
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs

  # ── Background Workers ──────────────────────────────────────────────────────
  queue-short:
    <<: *backend_defaults
    command: bench worker --queue short,default

  queue-long:
    <<: *backend_defaults
    command: bench worker --queue long,default,short

  # ── Scheduler ───────────────────────────────────────────────────────────────
  scheduler:
    <<: *backend_defaults
    command: bench schedule

  # ── MariaDB ─────────────────────────────────────────────────────────────────
  mariadb:
    image: mariadb:11.8
    container_name: meet-mariadb
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: _meet
      MYSQL_USER: meet
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mariadb-data:/var/lib/mysql
      - ./mariadb/my.cnf:/etc/mysql/conf.d/frappe.cnf:ro
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "127.0.0.1", "-u", "root", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: meet-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

  # ── Nginx (SSL termination + routing) ───────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: meet-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/templates:/etc/nginx/templates:ro
      - certbot-webroot:/var/www/certbot:ro
      - certbot-certs:/etc/letsencrypt:ro
    environment:
      DOMAIN: ${DOMAIN}
      FRAPPE_UPSTREAM: frappe-frontend:8080
      SFU_UPSTREAM: ${WEBRTC_ANNOUNCED_IP:-127.0.0.1}:${SFU_PORT:-3000}
    depends_on:
      - frappe-frontend
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

  # ── Certbot (SSL) ──────────────────────────────────────────────────────────
  certbot:
    image: certbot/certbot:latest
    container_name: meet-certbot
    volumes:
      - certbot-webroot:/var/www/certbot
      - certbot-certs:/etc/letsencrypt
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew --quiet; sleep 43200 & wait $${!}; done"
    profiles:
      - ssl
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "2"

  # ── SFU Server (host networking for WebRTC) ─────────────────────────────────
  sfu:
    image: ${SFU_IMAGE:-ghcr.io/frappe/meet/sfu-server:latest}
    container_name: meet-sfu
    restart: unless-stopped
    network_mode: host
    environment:
      - JWT_SECRET=${SFU_SECRET}
      - PORT=${SFU_PORT:-3000}
      - HOST=0.0.0.0
      - WEBRTC_LISTEN_IP=0.0.0.0
      - WEBRTC_ANNOUNCED_IP=${WEBRTC_ANNOUNCED_IP}
      - RTC_MIN_PORT=${RTC_MIN_PORT:-40000}
      - RTC_MAX_PORT=${RTC_MAX_PORT:-40200}
      - MEDIASOUP_NUM_WORKERS=${MEDIASOUP_NUM_WORKERS:-}
      - MEDIASOUP_WORKER_LOGLEVEL=${MEDIASOUP_WORKER_LOGLEVEL:-warn}
      - MEDIASOUP_LISTEN_IP=0.0.0.0
      - MEDIASOUP_ANNOUNCED_IP=${WEBRTC_ANNOUNCED_IP}
      - SFU_LOG_LEVEL=${SFU_LOG_LEVEL:-info}
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:${SFU_PORT:-3000}/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

volumes:
  sites:
  logs:
  mariadb-data:
  redis-data:
  certbot-webroot:
  certbot-certs:
