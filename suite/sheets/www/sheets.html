<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Frappe Sheets</title>
  <link rel="icon" type="image/svg+xml" href="/assets/sheets/sheets-favicon.svg" />
  {%- for href in assets.css %}
  <link rel="stylesheet" href="{{ href }}" />
  {%- endfor %}
</head>
<body>
  <script>
    window.csrf_token = "{{ csrf_token }}";
    // Minimal `window.frappe` shim so the SPA can render the logged-in
    // user (top-right avatar, ShareDialog owner row) without depending
    // on desk-only boot scripts.
    window.frappe = {
      session: {
        user: {{ session_user | tojson }},
        user_fullname: {{ session_user_fullname | tojson }},
        user_image: {{ session_user_image | tojson }},
      },
      // Subset of `frappe.boot` that the SPA actually reads — collab v2
      // toggle, optional override of the websocket URL, the sid that the
      // Hocuspocus provider passes as its auth token, and `sitename` /
      // `socketio_port` so the SPA can stand up `frappe.realtime` against
      // the site's socket.io namespace (the legacy presence path's only
      // transport on the public www page).
      boot: {
        collab_v2: {{ collab_v2 | tojson }},
        collab_ws_url: {{ collab_ws_url | tojson }},
        sid: {{ session_sid | tojson }},
        sitename: {{ sitename | tojson }},
        socketio_port: {{ socketio_port | tojson }},
        sentry_dsn:         {{ sentry_dsn         | tojson }},
        sentry_environment: {{ sentry_environment | tojson }},
        sentry_release:     {{ sentry_release     | tojson }},
      },
    };
  </script>
  <div id="root"></div>
  <script type="module" src="{{ assets.js }}"></script>
</body>
</html>
