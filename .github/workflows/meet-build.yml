name: Build and Push Meet Image

on:
  push:
    branches:
      - develop
    paths:
      - "suite/meet/**"
      - "frontend/src/apps/meet/**"
      - "pyproject.toml"
      - ".github/workflows/meet-build.yml"
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag (default: latest)"
        required: false
        default: "latest"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: frappe/suite/meet

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout suite
        uses: actions/checkout@v4

      - name: Checkout frappe_docker
        uses: actions/checkout@v4
        with:
          repository: frappe/frappe_docker
          path: frappe_docker

      - name: Prepare apps.json
        run: |
          echo '[{"url":"https://github.com/frappe/suite","branch":"'"$GITHUB_REF_NAME"'"}]' > apps.json

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=ref,event=branch
            type=raw,value=${{ github.event.inputs.tag || 'latest' }},enable=${{ github.event_name == 'workflow_dispatch' }}
            type=sha,prefix=,format=short

      - name: Inject Cache Buster
        run: |
          grep -q 'RUN --mount=type=secret,id=apps_json' frappe_docker/images/custom/Containerfile
          sed -i 's/RUN --mount=type=secret,id=apps_json/ARG CACHE_BUSTER\nRUN echo "Cache Buster: $CACHE_BUSTER"\nRUN --mount=type=secret,id=apps_json/' frappe_docker/images/custom/Containerfile

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: frappe_docker
          file: frappe_docker/images/custom/Containerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            CACHE_BUSTER=${{ github.sha }}
          secret-files: |
            apps_json=${{ github.workspace }}/apps.json
          cache-from: type=gha
          cache-to: type=gha,mode=max
