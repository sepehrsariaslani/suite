name: Meet Linters

on:
  pull_request:
    paths:
      - "suite/meet/**"
      - "frontend/src/apps/meet/**"
      - "pyproject.toml"
      - ".github/workflows/meet-linter.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: meet-linters-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linter:
    name: Frappe Linter
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "yarn"
          cache-dependency-path: |
            frontend/yarn.lock
            suite/meet/sfu-server/yarn.lock
            suite/meet/e2e/yarn.lock

      - name: Install frontend dependencies
        working-directory: frontend
        run: yarn install --frozen-lockfile

      - name: Install SFU Server dependencies
        working-directory: suite/meet/sfu-server
        run: yarn install --frozen-lockfile

      - name: Install E2E dependencies
        working-directory: suite/meet/e2e
        run: yarn install --frozen-lockfile

      - name: Download Semgrep rules
        run: git clone --depth 1 https://github.com/frappe/semgrep-rules.git frappe-semgrep-rules

      - name: Run Semgrep rules
        run: |
          pip install semgrep
          semgrep scan --config ./frappe-semgrep-rules/rules --config r/python.lang.correctness .

  deps-vulnerable-check:
    name: Vulnerable Dependency Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - uses: actions/checkout@v4

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/*requirements.txt', '**/pyproject.toml', '**/setup.py') }}
          restore-keys: |
            ${{ runner.os }}-pip-
            ${{ runner.os }}-

      - name: Install and run pip-audit
        run: |
          pip install pip-audit
          pip-audit --desc on .
