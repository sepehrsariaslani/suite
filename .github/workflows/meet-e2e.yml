name: Meet E2E Tests

on:
  push:
    branches:
      - develop
      - main
    paths:
      - "suite/meet/**"
      - "frontend/src/apps/meet/**"
      - "package.json"
      - "yarn.lock"
      - "pyproject.toml"
      - ".github/workflows/meet-e2e.yml"
  pull_request:
    paths:
      - "suite/meet/**"
      - "frontend/src/apps/meet/**"
      - "package.json"
      - "yarn.lock"
      - "pyproject.toml"
      - ".github/workflows/meet-e2e.yml"
  workflow_dispatch:

concurrency:
  group: meet-e2e-${{ github.event.number || github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    name: E2E Tests
    timeout-minutes: 60

    services:
      redis-cache:
        image: redis:alpine
        ports:
          - 13000:6379
      redis-queue:
        image: redis:alpine
        ports:
          - 11000:6379
      mariadb:
        image: mariadb:10.6
        env:
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: --health-cmd="mariadb-admin ping" --health-interval=5s --health-timeout=2s --health-retries=3

    steps:
      - name: Clone
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          check-latest: true

      - name: Add to Hosts
        run: echo "127.0.0.1 meet.test" | sudo tee -a /etc/hosts

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/*requirements.txt', '**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Get yarn cache directory path
        id: yarn-cache-dir-path
        run: 'echo "dir=$(yarn cache dir)" >> $GITHUB_OUTPUT'

      - name: Cache yarn
        uses: actions/cache@v4
        with:
          path: ${{ steps.yarn-cache-dir-path.outputs.dir }}
          key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-

      - name: Cache bench directory
        id: cache-bench
        uses: actions/cache@v4
        with:
          path: ~/frappe-bench
          key: ${{ runner.os }}-bench-${{ hashFiles('**/pyproject.toml', '**/yarn.lock', '**/requirements.txt', '**/package.json') }}
          restore-keys: |
            ${{ runner.os }}-bench-

      - name: Install MariaDB Client
        run: |
          sudo apt update
          sudo apt-get install -y mariadb-client

      - name: Setup Bench
        run: |
          pip install frappe-bench
          if [ "${{ steps.cache-bench.outputs.cache-hit }}" != "true" ]; then
            bench init --skip-redis-config-generation --skip-assets --python "$(which python)" ~/frappe-bench
          fi

      - name: Install Suite
        working-directory: /home/runner/frappe-bench
        run: |
          rm -rf apps/suite sites/meet.test sites/assets/suite
          bench get-app suite $GITHUB_WORKSPACE
          mariadb --host 127.0.0.1 --port 3306 -u root -proot -e "SET GLOBAL character_set_server = 'utf8mb4'"
          mariadb --host 127.0.0.1 --port 3306 -u root -proot -e "SET GLOBAL collation_server = 'utf8mb4_unicode_ci'"
          bench new-site --db-root-password root --admin-password admin meet.test
          bench --site meet.test install-app suite
          cd apps/suite
          yarn install --frozen-lockfile --non-interactive
          yarn build
          cd /home/runner/frappe-bench
          bench build
        env:
          CI: "Yes"

      - name: Configure Site for E2E
        working-directory: /home/runner/frappe-bench
        run: |
          bench --site meet.test set-config sfu_secret "e2e-test-secret-key-12345"
          bench --site meet.test set-config sfu_server_url "http://localhost"
          bench --site meet.test set-config sfu_server_port "3000"
          bench --site meet.test set-config ignore_csrf 1
          bench --site meet.test set-config allow_tests true
          bench --site meet.test set-config host_name "http://meet.test:8000"

      - name: Build SFU Server
        working-directory: ${{ github.workspace }}/suite/meet/sfu-server
        run: |
          yarn install --frozen-lockfile
          yarn build

      - name: Install E2E Dependencies
        working-directory: ${{ github.workspace }}/suite/meet/e2e
        timeout-minutes: 20
        run: |
          yarn install --frozen-lockfile --non-interactive
          yarn playwright install-deps chromium
          google-chrome --version

      - name: Start Frappe Server
        working-directory: /home/runner/frappe-bench
        run: |
          sed -i 's/^watch:/# watch:/g' Procfile
          sed -i 's/^schedule:/# schedule:/g' Procfile
          bench start &> bench_start.log &
          echo "Waiting for Frappe server to start..."
          timeout 60 bash -c 'until curl -s http://meet.test:8000 > /dev/null; do sleep 2; done'
          echo "Frappe server is ready!"

      - name: Start SFU Server
        working-directory: ${{ github.workspace }}/suite/meet/sfu-server
        run: |
          yarn start &
          echo "Waiting for SFU server..."
          timeout 30 bash -c 'until curl -s http://localhost:3000/health > /dev/null 2>&1; do sleep 2; done'
          echo "SFU server is ready"
        env:
          PORT: 3000
          HOST: 0.0.0.0
          JWT_SECRET: e2e-test-secret-key-12345
          WEBRTC_ANNOUNCED_IP: 127.0.0.1
          MEDIASOUP_NUM_WORKERS: 1

      - name: Run E2E Tests
        working-directory: ${{ github.workspace }}/suite/meet/e2e
        run: yarn test
        env:
          BASE_URL: http://meet.test:8000
          SFU_URL: http://localhost:3000
          CI: true

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: meet-playwright-report
          path: |
            suite/meet/e2e/playwright-report/
            suite/meet/e2e/test-results/
          compression-level: 1
          retention-days: 7
